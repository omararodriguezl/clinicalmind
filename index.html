<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ClinicalMind — AI-assisted clinical documentation for mental health professionals" />
    <meta name="theme-color" content="#F2EFE8" id="theme-color-meta" />
    <!-- PWA -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ClinicalMind" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Prevent caching of sensitive pages -->
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>ClinicalMind</title>
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('cm_theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
          document.getElementById('theme-color-meta')?.setAttribute('content','#11140F');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
